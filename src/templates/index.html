<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JodohMatching | Temukan Belahan Jiwamu</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body class="bg-light">
    <div
      class="container min-vh-100 d-flex flex-column justify-content-center align-items-center py-5"
    >
      <div class="card shadow-lg p-4 text-center main-card animate-fade-in">
        <h1 class="display-5 fw-bold text-danger mb-2">❤️ JodohMatching</h1>
        <p class="text-muted mb-4">
          Unggah foto kamu dan targetmu untuk melihat persentase kecocokan wajah
          kalian!
        </p>

        <!-- Form Upload -->
        <form
          action="/result"
          method="POST"
          enctype="multipart/form-data"
          id="matchForm"
        >
          <div class="row g-4 mb-4">
            <!-- Foto User -->
            <div class="col-md-6">
              <div class="upload-box p-3 border rounded-3 bg-white">
                <h5 class="fw-semibold mb-3">Foto Kamu</h5>
                <div
                  class="preview-container mb-3 d-flex align-items-center justify-content-center border rounded"
                >
                  <img
                    id="previewUser"
                    src="#"
                    alt="Preview"
                    class="d-none img-fluid rounded"
                  />
                  <span id="textUser" class="text-muted small"
                    >Belum ada foto</span
                  >
                </div>
                <input
                  type="file"
                  name="foto_user"
                  id="inputUser"
                  class="form-control"
                  accept="image/*"
                  required
                />
              </div>
            </div>

            <!-- Foto Target -->
            <div class="col-md-6">
              <div class="upload-box p-3 border rounded-3 bg-white">
                <h5 class="fw-semibold mb-3">Foto Doi</h5>
                <div
                  class="preview-container mb-3 d-flex align-items-center justify-content-center border rounded"
                >
                  <img
                    id="previewTarget"
                    src="#"
                    alt="Preview"
                    class="d-none img-fluid rounded"
                  />
                  <span id="textTarget" class="text-muted small"
                    >Belum ada foto</span
                  >
                </div>
                <input
                  type="file"
                  name="foto_target"
                  id="inputTarget"
                  class="form-control"
                  accept="image/*"
                  required
                />
              </div>
            </div>
          </div>

          <!-- Tombol Aksi & Loading State -->
          <button
            type="submit"
            class="btn btn-danger btn-lg w-100 py-3 fw-bold shadow-sm custom-btn"
            id="btnSubmit"
          >
            💘 Cek Persentase Jodoh
          </button>

          <div
            id="loadingState"
            class="d-none mt-3 animate-pulse text-danger fw-bold"
          >
            <div
              class="spinner-border spinner-border-sm me-2"
              role="status"
            ></div>
            Memindai struktur wajah dan menghitung kecocokan...
          </div>
        </form>
      </div>
    </div>

    <!-- JS Native Integration -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
